syntax = "proto3";

package telemetry;

message Metrics {
  float cpu_usage = 1;
  float memory_usage = 2;
  float temperature = 3;
  string mode = 4;
}

// -- change of mode request --
message SetModeRequest {
  string mode = 1;
}

// -- change of mode response --
message SetModeResponse {
  bool success = 1;
  string message = 2;
}

// -- empty --
message Empty{}

// -- service --
service MetricsService {
  rpc GetMetrics(Empty) returns (Metrics); // pull (reading)
  rpc SetMode(SetModeRequest) returns (SetModeResponse); // command (control)
}
